- name: Prepare
  hosts: all
  pre_tasks:
  - name: Install sudo if missing
    ansible.builtin.raw: '{{ ansible_pkg_mgr | default(''dnf'') }} install -y sudo'
    become: false
    changed_when: false
    failed_when: false
  - name: Update the apt-cache, if necessary
    ansible.builtin.apt:
      cache_valid_time: 86400
      update_cache: true
    when: ansible_facts['os_family'] == 'Debian'
  roles:
  - buluma.setuptools
